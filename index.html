<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- iOS / mobile viewport: respect safe-area insets on notched iPhones -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- iOS web-app meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AESS Trade" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme color (dark) -->
    <meta name="theme-color" content="#0f172a" />

    <title>AESS Trade</title>
    <meta name="description" content="Coinbase Advanced Trade dashboard — live prices, news, and portfolio management." />

    <!-- Tailwind CSS (CDN — replaced by PostCSS/Tailwind in production build if added later) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

      /* ── Base ── */
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        height: 100%;
      }

      #root {
        height: 100%;
        /* Account for iOS home indicator and status bar */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* Prevent text size adjustment on iOS rotation */
      html { -webkit-text-size-adjust: 100%; }

      /* Smooth scrolling */
      html { scroll-behavior: smooth; }

      /* Native-feel scrolling on iOS */
      .overflow-y-auto, .overflow-x-auto {
        -webkit-overflow-scrolling: touch;
      }

      /* Hide scrollbars on iOS but keep scrollable */
      ::-webkit-scrollbar { display: none; }

      /* ── Tailwind bg-slate-750 shim (not in default palette) ── */
      .bg-slate-750 { background-color: #293548; }
      .hover\:bg-slate-750:hover { background-color: #293548; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
